<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex Tracker</title>
    <style>
        /* Modern Reset & Typography */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333333;
            background-color: #f8fafc;
            padding: 40px 20px;
            <!-- This links directly to the external card image URL -->
                <img src="https://pkmncards.com/wp-content/uploads/mebsp_en_040_std.jpg" 
                 alt="Pokémon Card Promo" 
                 class="card-promo">
        .card-promo {
                        display: block;        /* Centers the image layout and prevents text crowding */
                        max-width: 100%;       /* Prevents the image from spilling off smaller phone screens */
                        width: 320px;          /* Sets a realistic desktop viewing width for a trading card */
                        height: auto;          /* Maintains the card's original vertical proportions */
                        margin: 20px auto;     /* Centers the card horizontally with space above and below */
                        border-radius: 14px;   /* Gives the card clean, slightly rounded corners matching real card cuts */
                        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15); /* Adds a subtle drop shadow to make the card pop */
                    }
        
        }

        /* Container Layout */
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        /* Headings & Text Styling */
        h1 {
            color: #1e3a8a; /* Deep Slate Blue */
            font-size: 2.5rem;
            margin-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }
        p {
            margin-bottom: 20px;
            font-size: 1.1rem;
            color: #4b5563;
        }

        /* Interactive Elements (Buttons) */
        .btn {
            display: inline-block;
            background-color: #2563eb;
            color: #ffffff;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background-color 0.2s ease;
        }
        .btn:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to My Project Space</h1>
        <p>This page is hosted completely free on GitHub Pages. By adding a clean layout, a modern font stack, subtle shadows, and intentional padding, we can make any basic HTML layout look incredibly sharp.</p>
        <a href="#" class="btn">Explore My Tracker</a>
    </div>

</body>
</html>

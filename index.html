<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinnoh Master Binder</title>
    <style>
        /* CSS: Styles the layout and card boxes */
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; padding: 20px; }
        h1 { text-align: center; color: #38bdf8; }
        
        .binder-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 20px; 
            max-width: 1200px; 
            margin: 20px auto;
        }
        
        .card-box { 
            background: #1e293b; 
            border: 2px solid #334155; 
            border-radius: 12px; 
            padding: 15px; 
            text-align: center; 
            transition: border-color 0.3s;
        }
        
        .card-box.owned { border-color: #10b981; background: #064e3b; }
        
        .card-box img { width: 100%; max-width: 120px; display: block; margin: 0 auto 10px; }
        
        button { 
            padding: 8px 16px; cursor: pointer; border-radius: 6px; 
            border: none; background: #38bdf8; color: #0f172a; font-weight: bold; 
        }
        .owned button { background: #10b981; color: white; }
    </style>
</head>
<body>

    <h1>Sinnoh Master Binder</h1>
    <div class="binder-grid" id="binderContainer"></div>

</html>

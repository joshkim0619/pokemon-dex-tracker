<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Pokémon Binder Tracker</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #1e293b; /* Dark backdrop */
            color: #f8fafc;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 3x3 Binder Layout Sheet */
        .binder-page {
            background-color: #0f172a; /* Outer binder sleeve shadow block */
            border: 10px solid #334155; 
            border-radius: 16px;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Creates exact 3x3 layout structural grid */
            gap: 15px;
            max-width: 850px;
            width: 100%;
        }

        /* Individual Card Pockets */
        .card-pocket {
            background-color: #1e293b;
            border: 2px dashed #475569;
            border-radius: 10px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
        }

        /* The Card Image Filter Rules */
        .card-image {
            width: 100%;
            height: auto;
            border-radius: 8px;
            filter: grayscale(100%) opacity(25%); /* Completely faded out and grey if missing */
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Active "Owned" Styling States */
        .card-pocket.owned {
            border-style: solid;
            border-color: #38bdf8; /* Vibrant light-blue highlight ring */
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.25);
        }

        .card-pocket.owned .card-image {
            filter: grayscale(0%) opacity(100%); /* Returns to spectacular full color display */
            transform: scale(1.03); /* Pops forward slightly */
        }

        .checkbox-label {
            margin-top: 10px;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>
<body>

    <h1>3x3 Binder View</h1>
    <p style="margin-bottom: 25px; color: #94a3b8;">Check the boxes to slide the promos inside your binder pockets.</p>

    <div class="binder-page">
        <!-- Pocket Slot 1 -->
        <div class="card-pocket" id="pocket1">
            <img src="https://pkmncards.com/wp-content/uploads/mebsp_en_040_std.jpg" alt="Promo Card" class="card-image">
            <label class="checkbox-label">
                <input type="checkbox" onchange="updatePocket('pocket1', this)"> Owned
            </label>
        </div>

        <!-- Pocket Slot 2 -->
        <div class="card-pocket" id="pocket2">
            <img src="https://pkmncards.com/wp-content/uploads/mebsp_en_040_std.jpg" alt="Promo Card" class="card-image">
            <label class="checkbox-label">
                <input type="checkbox" onchange="updatePocket('pocket2', this)"> Owned
            </label>
        </div>

        <!-- Pocket Slot 3 -->
        <div class="card-pocket" id="pocket3">
            <img src="https://pkmncards.com/wp-content/uploads/mebsp_en_040_std.jpg" alt="Promo Card" class="card-image">
            <label class="checkbox-label">
                <input type="checkbox" onchange="updatePocket('pocket3', this)"> Owned
            </label>
        </div>

        <!-- Repeat this block for pockets 4 through 9 inside your binder page grid -->
    </div>

    <!-- JavaScript function to manipulate the display states seamlessly -->
    <script>
        function updatePocket(pocketId, checkbox) {
            const pocket = document.getElementById(pocketId);
            if (checkbox.checked) {
                pocket.classList.add('owned');
            } else {
                pocket.classList.remove('owned');
            }
        }
    </script>

</body>
</html>
